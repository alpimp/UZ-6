  <script>
     
    const defaultTheme = 'system';

    const setDarkTheme = () => {
      document.documentElement.classList.add("dark");
      document.documentElement.style.colorScheme = "dark";
    }
    const setLightTheme = () => {
      document.documentElement.classList.remove("dark");
      document.documentElement.style.colorScheme = "light";
    }

    if ("color-theme" in localStorage) {
      localStorage.getItem("color-theme") === "dark" ? setDarkTheme() : setLightTheme();
    } else {
      defaultTheme === "dark" ? setDarkTheme() : setLightTheme();
      if (defaultTheme === "system") {
        window.matchMedia("(prefers-color-scheme: dark)").matches ? setDarkTheme() : setLightTheme();
      }
    }
  </script>

let discount_price = document.getElementById("discount");
let customTitle = "";
doors.forEach(function (door) {
  door.addEventListener("click", openDoor);
});
function openDoor(e) {
  e.currentTarget.classList.add("open");
  doorSales.forEach(function (sale) {
    if (door1.classList.contains("open")) {
      doorSale1.innerHTML = discount_price.textContent + "%";
      doorSale2.innerHTML = "15%";
      doorSale3.innerHTML = "25%";
    } else if (door2.classList.contains("open")) {
      doorSale2.innerHTML = discount_price.textContent + "%";
      doorSale1.innerHTML = "25%";
      doorSale3.innerHTML = "15%";
    } else if (door3.classList.contains("open")) {
      doorSale1.innerHTML = "15%";
      doorSale3.innerHTML = discount_price.textContent + "%";
      doorSale2.innerHTML = "25%";
    }
  });
  for (let i = 0; i < doors.length; i++) {
    if (!doors[i].classList.contains("open")) {
      setTimeout(function () {
        doors[i].classList.add("open");
      }, 2500);
    }
  }
  for (let j = 0; j < doors.length; j++) {
    doors[j].removeEventListener("click", openDoor);
  }
  showResultWindow();
  showForm();
}
function showResultWindow() {
  setTimeout(function () {
    $(".spin-result-wrapper").css("display", "block");
  }, 2000);
}
function showForm() {
  setTimeout(function () {
    $(".door__wrapper").slideUp();
    $(".order_block").slideDown();
    setTimeout(function(){$("html,body").animate({ scrollTop: $("#order_form").offset().top - ($(window).height() - $("#order_form").outerHeight(true))}) 
  }, 1000);
  }, 3500);
}
if (typeof customDoorsForm !== "undefined") {

  $(".default_spin-result-wrapper").remove();
}

  function fingerprint_language() {
      "use strict";
      var strSep, strPair, strOnError, strLang, strTypeLng, strTypeBrLng, strTypeSysLng, strTypeUsrLng, strOut;

      strSep = "|";
      strPair = "=";
      strOnError = "Error";
      strLang = null;
      strTypeLng = null;
      strTypeBrLng = null;
      strTypeSysLng = null;
      strTypeUsrLng = null;
      strOut = null;

      try {
          strTypeLng = typeof (navigator.language);
          strTypeBrLng = typeof (navigator.browserLanguage);
          strTypeSysLng = typeof (navigator.systemLanguage);
          strTypeUsrLng = typeof (navigator.userLanguage);

          if (strTypeLng !== "undefined") {
              strLang = "lang" + strPair + navigator.language + strSep;
          } else if (strTypeBrLng !== "undefined") {
              strLang = "lang" + strPair + navigator.browserLanguage + strSep;
          } else {
              strLang = "lang" + strPair + strSep;
          }
          if (strTypeSysLng !== "undefined") {
              strLang += "syslang" + strPair + navigator.systemLanguage + strSep;
          } else {
              strLang += "syslang" + strPair + strSep;
          }
          if (strTypeUsrLng !== "undefined") {
              strLang += "userlang" + strPair + navigator.userLanguage;
          } else {
              strLang += "userlang" + strPair;
          }
          strOut = strLang;
          return strOut;
      } catch (err) {
          return strOnError;
      }
  };
  const lang = fingerprint_language();

          return strOut;
      } catch (err) {
          return strOnError;
